global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: anvil-notify
    static_configs:
      - targets: ["anvil-notify:9091"]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      # Requires the RabbitMQ Prometheus plugin to be enabled:
      #   rabbitmq-plugins enable rabbitmq_prometheus
      # Port 15692 must also be exposed in docker-compose.yml when using
      # the observability profile.
      - targets: ["rabbitmq:15692"]
    metrics_path: /metrics

  # Uncomment and deploy a postgres_exporter sidecar to enable DB metrics.
  # See: https://github.com/prometheus-community/postgres_exporter
  # - job_name: postgres
  #   static_configs:
  #     - targets: ["postgres-exporter:9187"]
