global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:9091"]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: ["rabbitmq:15692"]   # RabbitMQ prometheus plugin port
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
