version: "3.9"

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  backend:
    driver: bridge
  business:
    driver: bridge
  observability:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  pg_data:
  business_pg_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

# ── Services ──────────────────────────────────────────────────────────────────
services:
  # ── PostgreSQL (anvil-notify own DB) ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-anvil_notify}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-anvil_notify}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── PostgreSQL (business service DB) ─────────────────────────────────────
  business-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${BUSINESS_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${BUSINESS_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${BUSINESS_POSTGRES_DB:-business}
    ports:
      - "${BUSINESS_POSTGRES_PORT:-5433}:5432"
    volumes:
      - business_pg_data:/var/lib/postgresql/data
    networks:
      - business
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${BUSINESS_POSTGRES_USER:-postgres} -d ${BUSINESS_POSTGRES_DB:-business}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ── Migration runner ──────────────────────────────────────────────────────
  # Runs once, applies all pending migrations to both DBs, then exits (code 0).
  # anvil-notify and outbox-worker both wait for this to complete
  # before starting, so the schema is always ready before any app code runs.
  #
  # Re-running `docker compose up` is safe — sqlx skips already-applied migrations.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile.migrate
    image: ns-migrate:latest
    restart: "no" # run once and exit — do NOT restart on success
    depends_on:
      postgres:
        condition: service_healthy
      business-postgres:
        condition: service_healthy
    environment:
      ANVIL_DATABASE_URL: >-
        postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anvil_notify}
      BUSINESS_DATABASE_URL: >-
        postgres://${BUSINESS_POSTGRES_USER:-postgres}:${BUSINESS_POSTGRES_PASSWORD:-postgres}@business-postgres:5432/${BUSINESS_POSTGRES_DB:-business}
    networks:
      - backend
      - business

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-guest}
    ports:
      - "${RABBITMQ_AMQP_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend
      - business
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Mailpit — local SMTP catch-all (dev only) ─────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"
    networks:
      - backend
    # profiles:
    #   - dev

  # ── Notification service ──────────────────────────────────────────────────
  # Waits for migrate to finish — schema is guaranteed ready on first query.
  # No longer calls sqlx::migrate!() itself; that's the runner's job.
  anvil-notify:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: anvil-notify:latest
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./config/local.toml:/app/config/local.toml:ro
    environment:
      AN__HTTP__ALLOW_UNAUTHENTICATED: true
      AN__DATABASE__URL: >-
        postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-anvil_notify}
      AN__AMQP__URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      AN__MAILER__PASSWORD: ${SMTP_PASS:-}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: pretty
    ports:
      - "${SERVICE_PORT:-8080}:8080"
      - "${METRICS_PORT:-9091}:9091"
    networks:
      - backend
      - observability
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Outbox worker ─────────────────────────────────────────────────────────
  # Also waits for migrate — business DB schema must exist before polling.
  outbox-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    entrypoint: ["outbox-worker"]
    image: anvil-notify:latest
    restart: unless-stopped
    stop_grace_period: 35s
    depends_on:
      migrate:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    environment:
      AN__OUTBOX__DATABASE_URL: >-
        postgres://${BUSINESS_POSTGRES_USER:-postgres}:${BUSINESS_POSTGRES_PASSWORD:-postgres}@business-postgres:5432/${BUSINESS_POSTGRES_DB:-business}
      AN__OUTBOX__AMQP_URL: amqp://${RABBITMQ_USER:-guest}:${RABBITMQ_PASS:-guest}@rabbitmq:5672
      AN__OUTBOX__EXCHANGE: ${AMQP_EXCHANGE:-anvil-notify}
      AN__OUTBOX__ROUTING_KEY: ${AMQP_ROUTING_KEY:-email.requested}
      AN__OUTBOX__POLL_INTERVAL_MS: ${OUTBOX_POLL_INTERVAL_MS:-1000}
      AN__OUTBOX__BATCH_SIZE: ${OUTBOX_BATCH_SIZE:-50}
      RUST_LOG: ${RUST_LOG:-info}
      LOG_FORMAT: pretty
    networks:
      - business

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    networks:
      - observability
    profiles:
      - observability

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASS:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    networks:
      - observability
    profiles:
      - observability
