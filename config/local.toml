# config/local.toml — Docker Compose overrides
# Loaded after config/default.toml; values here win over defaults.
# Mount this file read-only into the container (see docker-compose.yml).
#
# Secrets that differ between deployments (DB password, SMTP password, API key)
# can still be supplied via AN__* env vars — they layer on top of this file.
# Everything that has a type the env-var source struggles with (u16 ports,
# Vec<String> arrays) lives here as proper TOML so the config crate never
# has to coerce a string.

[database]
url = "postgres://postgres:postgres@postgres:5432/anvil_notify"

[amqp]
url             = "amqp://guest:guest@rabbitmq:5672"
queue           = "email.requested"
exchange        = "anvil-notify"
routing_key     = "email.requested"
max_retries     = 3
retry_base_ms   = 1000
max_concurrency = 10

[http]
port = 8080
# Uncomment and set a real token in production:
# api_key = "change-me"

metrics_port = 9091

[rate_limit]
emails_per_second = 10
burst_size        = 20

# ── Recipient filter ──────────────────────────────────────────────────────────
# Edit these lists directly — proper TOML arrays, no shell-quoting issues.
[filter]
blocked_emails  = []
blocked_domains = []
# Uncomment for allowlist / staging mode:
# allowed_domains = ["yourcompany.com"]
# allowed_emails  = ["tester@external.com"]

# ── Mailer ────────────────────────────────────────────────────────────────────
# Dev default: points at the Mailpit catch-all (start with --profile dev).
# For production, change host/port/username/password/from_email/from_name,
# or supply AN__MAILER__PASSWORD via an env var / Docker secret.
[mailer]
backend    = "smtp"
host       = "mailpit"
port       = 1025
username   = ""
password   = ""
from_email = "no-reply@example.com"
from_name  = "AnvilNotify"
