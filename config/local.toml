# config/local.toml — Docker Compose overrides
# Loaded after config/default.toml; values here win over defaults.
# Mount this file read-only into the container (see docker-compose.yml).
#
# Secrets that differ between deployments (DB password, SMTP password, API key)
# can still be supplied via AN__* env vars — they layer on top of this file.
# Everything that has a type the env-var source struggles with (u16 ports,
# Vec<String> arrays) lives here as proper TOML so the config crate never
# has to coerce a string.

[database]
url = "postgres://postgres:postgres@postgres:5432/anvil_notify"

[amqp]
url             = "amqp://guest:guest@rabbitmq:5672"
queue           = "email.requested"
exchange        = "anvil-notify"
routing_key     = "email.requested"
max_retries     = 3
retry_base_ms   = 1000
max_concurrency = 10

[http]
port = 8080
# Uncomment and set a real token in production:
# api_key = "change-me"

metrics_port = 9091

[rate_limit]
emails_per_second = 10
burst_size        = 20

# ── Recipient filter ──────────────────────────────────────────────────────────
# Edit these lists directly — proper TOML arrays, no shell-quoting issues.
[filter]
blocked_emails  = []
blocked_domains = []
# Uncomment for allowlist / staging mode:
# allowed_domains = ["yourcompany.com"]
# allowed_emails  = ["tester@external.com"]

# ── Mailer ────────────────────────────────────────────────────────────────────
# Dev default: points at the Mailpit catch-all SMTP server.
# Start Mailpit with: docker compose up mailpit  (or --profile dev)
# View caught emails at: http://localhost:8025
#
# Mailpit listens on port 1025 with no auth and no TLS — tls_mode = "none"
# and empty username/password match that exactly.
#
# For production, replace with real SMTP credentials or supply via env vars:
#   AN__MAILER__HOST, AN__MAILER__PORT, AN__MAILER__USERNAME, AN__MAILER__PASSWORD
#   AN__MAILER__FROM_EMAIL, AN__MAILER__FROM_NAME
[mailer]
backend    = "smtp"
host       = "mailpit"         # docker-compose service name; use "localhost" when running outside compose
port       = 1025
username   = ""                # Mailpit requires no authentication
password   = ""
from_email = "no-reply@example.com"
from_name  = "AnvilNotify Dev"
tls_mode   = "none"            # port 1025 is plain — no TLS negotiation

# Timeouts are intentionally short for local dev so failures surface quickly.
connection_timeout_ms = 2000   # default: 5000
read_timeout_ms       = 5000   # default: 10000
write_timeout_ms      = 5000   # default: 10000
pool_size             = 2      # small pool is fine for dev; default: 5

# ── Named sender accounts (dev) ───────────────────────────────────────────────
# A "mailpit" account is pre-configured so developers can test the
# multi-sender-account code path without needing real SMTP credentials.
# Events that set "sender_account": "mailpit" in their payload will use
# this entry; all other events fall back to the global [mailer] above,
# which also points at Mailpit.
#
# The Mailpit UI is at http://localhost:8025 — all sent mail appears there
# regardless of which account delivered it.
#
# To test a real named account alongside Mailpit, add another entry here:
#   [sender_accounts.production_smtp]
#   host       = "smtp.example.com"
#   port       = 587
#   username   = "user@example.com"
#   password   = "secret"
#   from_email = "noreply@example.com"
#   from_name  = "My App"
[sender_accounts.mailpit]
host       = "mailpit"          # docker-compose service name
port       = 1025
username   = ""                 # Mailpit requires no authentication
password   = ""
from_email = "mailpit-account@example.com"
from_name  = "AnvilNotify Dev (mailpit account)"
tls_mode   = "none"
