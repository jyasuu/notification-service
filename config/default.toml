# config/default.toml
# Override any field with environment variables prefixed AN__
# e.g. AN__DATABASE__URL="postgres://..." AN__MAILER__BACKEND="smtp"

[database]
url = "postgres://postgres:postgres@localhost:5432/anvil_notify"
# pool_size = 10   # Max DB connections. Override via AN__DATABASE__POOL_SIZE.

# Optional: set AN__OUTBOX_DATABASE_URL to enable the built-in outbox worker.
# Leave unset if your business service publishes to RabbitMQ directly.
# outbox_database_url = "postgres://postgres:postgres@localhost:5432/business"

[amqp]
url                   = "amqp://guest:guest@localhost:5672"
queue                 = "email.requested"
exchange              = "anvil-notify"
routing_key           = "email.requested"
max_retries           = 3
retry_base_ms         = 1000
max_concurrency       = 10      # max parallel message handlers
# Maximum consecutive rate-limit backoff cycles per recipient before it is
# permanently marked FAILED.  Each cycle waits up to ~4 minutes total.
# Increase for providers with long rate-limit cooldown windows (e.g. free-tier
# SendGrid); decrease to fail faster during sustained outages.
max_rl_waits          = 5
# Hard cap on recipients per AMQP message. Events exceeding this are sent to
# the DLQ for operator inspection. Raise for bulk-mailing; default: 500.
max_recipients_per_event = 500
outbox_poll_interval_ms      = 1000  # base ms between outbox polls; backs off up to 8× when idle
outbox_batch_size            = 10    # rows per poll cycle (smaller = shorter IN_PROGRESS lock window)
# outbox_pool_size           = 2    # DB connections for the outbox worker (rarely needs > 2)
# outbox_stale_lock_timeout_secs = 300  # seconds before a stuck IN_PROGRESS row is reset to PENDING

[http]
port = 8080

# Optional: bearer token required on all /emails/* endpoints.
# Set AN__HTTP__API_KEY=<token> in production. Leave unset only when the
# API is isolated behind a private network (e.g. Kubernetes ClusterIP).
# api_key = "change-me-in-production"

# Port for the Prometheus /metrics endpoint (never expose this publicly).
metrics_port = 9091

# ── Mail server rate limiting ─────────────────────────────────────────────────
# Prevents overwhelming the SMTP server or webhook endpoint.
# Set emails_per_second = 0 to disable.
# Check your provider's docs: SendGrid free = 100/day, Pro = 100/s, etc.
[rate_limit]
emails_per_second = 10   # steady-state throughput cap
burst_size        = 20   # allows short bursts above the steady rate

# ── Recipient block / allow-list ──────────────────────────────────────────────
# blocked_emails and blocked_domains are always applied.
# allowed_emails / allowed_domains activate allowlist mode (staging / dev):
#   only listed addresses or domains will receive email; all others are dropped.
# Leave all four empty (default) for passthrough — no filtering.
[filter]
blocked_emails  = []   # e.g. ["unsubscribed@example.com"]
blocked_domains = []   # e.g. ["competitor.com"]
# Uncomment to enable allowlist mode (recommended for staging):
# allowed_domains = ["yourcompany.com"]
# allowed_emails  = ["tester@external.com"]

# How long resolved templates are cached in memory.
# Increase for high-throughput deployments; decrease (or set to 0) when editing
# templates frequently. Operators can also call DELETE /templates/cache for
# immediate invalidation without restarting the service.
template_cache_ttl_secs = 300  # 5 minutes

# Maximum size of a single fetched email attachment in bytes.
# Attachments larger than this are permanently rejected (no retry).
# Default: 10 MiB. Override with AN__MAX_ATTACHMENT_BYTES.
max_attachment_bytes = 10485760  # 10 * 1024 * 1024

# ── Choose one backend ────────────────────────────────────────────────────────
#
# TLS mode is selected automatically by port:
#   465  → implicit TLS (SMTPS)        e.g. AWS SES, Fastmail
#   587  → STARTTLS                    e.g. SendGrid, Mailgun, Gmail SMTP
#   25   → STARTTLS                    standard MTA submission
#   other (e.g. 1025, 2525) → plain    dev catch-all servers (Mailpit, MailHog)

# Option A: SMTP
[mailer]
backend    = "smtp"
host       = "smtp.example.com"
port       = 587
username   = "user@example.com"
password   = "secret"
from_email = "no-reply@example.com"
from_name  = "Example App"

# Option B: Webhook
# [mailer]
# backend    = "webhook"
# url        = "https://hooks.example.com/email"
# auth_token = "bearer-token"

# ── Named sender accounts (optional) ─────────────────────────────────────────
# Allows multiple business systems to send from their own SMTP accounts,
# each with independent credentials and From address.
#
# The publisher sets "sender_account": "<name>" in the EmailEvent to select
# an account. When the field is absent or the name is not found here, the
# service falls back to the global [mailer] config above.
#
# Example — two business systems sharing this notification service:
#
# [sender_accounts.system_a]
# host       = "smtp.gmail.com"
# port       = 587
# username   = "A@example.com"
# password   = "app-password-a"     # Gmail App Password (not login password)
# from_email = "A@example.com"
# from_name  = "System A"
#
# [sender_accounts.system_b]
# host       = "smtp.sendgrid.net"
# port       = 587
# username   = "apikey"             # SendGrid: literal "apikey"
# password   = "SG.xxxxxxxxxxxx"    # SendGrid API key with Mail Send scope
# from_email = "B@example.com"
# from_name  = "System B"
#
# Publisher payload:
#   { "sender_account": "system_a", "type": "ORDER_CONFIRMATION", ... }
#   → authenticated as A@example.com, From: System A <A@example.com>
